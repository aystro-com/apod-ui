# nginx config for the apod-ui container image.
#
# Serves the built SPA and reverse-proxies the apod REST API + webhooks to the
# apod daemon's unix socket. The driver bind-mounts the socket's DIRECTORY
# (/run/apod) so the path stays valid across daemon restarts, which recreate the
# socket with a new inode. Same-origin, so there is no CORS and the UI's
# "Server URL" field can be left empty at login.
#
# Workers run as group `root` (gid 0) so they can connect to the daemon socket,
# which apod creates as `srw-rw---- root root`. The worker UID stays `nginx`.
user nginx root;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # websocket upgrade passthrough (harmless when unused)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # the apod daemon, reached over the bind-mounted host unix socket
    upstream apod_daemon {
        server unix:/run/apod/apod.sock;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # API payloads include whole DB dumps, pasted compose files, and driver
        # YAML — nginx's 1m default would 413 these before they reach the daemon.
        client_max_body_size 64m;

        # Security headers for the admin panel. CSP is also set via a <meta> tag
        # in index.html, but a response header is stronger (covers non-HTML
        # responses). Keep the two in sync with vite.config.ts.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # The panel is served over TLS (terminated upstream); pin browsers to HTTPS.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # API + webhooks -> apod daemon. A named upstream means proxy_pass
        # forwards the original request URI unchanged (no path rewriting).
        location /api/ {
            proxy_pass http://apod_daemon;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Mark traffic as web-proxied so the daemon requires real token auth
            # instead of granting the control socket's implicit admin. Always
            # set here, overriding any client-supplied value.
            proxy_set_header X-Apod-Proxied "1";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
        location /webhook/ {
            proxy_pass http://apod_daemon;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Apod-Proxied "1";
        }

        # Hashed build assets are immutable — cache them hard. NOTE: any
        # add_header in a location REPLACES the server-level set (nginx does not
        # merge), so the security headers must be repeated here.
        location /assets/ {
            try_files $uri =404;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # index.html must never be cached: it references the hashed asset
        # filenames, so a stale copy after a deploy points at bundles that no
        # longer exist (blank page until a hard refresh). Re-declare every
        # security header — a location-level add_header drops the inherited set.
        location = /index.html {
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
            add_header Cache-Control "no-cache" always;
        }

        # SPA: serve static assets, fall back to index.html for client routes
        location / {
            try_files $uri /index.html;
        }
    }
}
