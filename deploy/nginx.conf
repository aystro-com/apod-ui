# nginx config for the apod-ui container image.
#
# Serves the built SPA and reverse-proxies the apod REST API + webhooks to the
# apod daemon's unix socket. The driver bind-mounts the socket's DIRECTORY
# (/run/apod) so the path stays valid across daemon restarts, which recreate the
# socket with a new inode. Same-origin, so there is no CORS and the UI's
# "Server URL" field can be left empty at login.
#
# Workers run as group `root` (gid 0) so they can connect to the daemon socket,
# which apod creates as `srw-rw---- root root`. The worker UID stays `nginx`.
user nginx root;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # websocket upgrade passthrough (harmless when unused)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # the apod daemon, reached over the bind-mounted host unix socket
    upstream apod_daemon {
        server unix:/run/apod/apod.sock;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # API + webhooks -> apod daemon. A named upstream means proxy_pass
        # forwards the original request URI unchanged (no path rewriting).
        location /api/ {
            proxy_pass http://apod_daemon;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
        location /webhook/ {
            proxy_pass http://apod_daemon;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # SPA: serve static assets, fall back to index.html for client routes
        location / {
            try_files $uri /index.html;
        }
    }
}
